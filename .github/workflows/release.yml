name: Build Release ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "${{ steps.ver.outputs.version }}" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version ${{ steps.ver.outputs.version }}" >&2
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: npm test

      - name: Build extension ZIP
        run: |
          mkdir -p dist
          zip -r "dist/chrome-translation-ext-${GITHUB_REF_NAME}.zip" \
            manifest.json \
            background.js \
            content.js \
            content.css \
            options.html \
            options.js \
            lib \
            icons/icon-16.png icons/icon-48.png icons/icon-128.png

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chrome-translation-ext-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
